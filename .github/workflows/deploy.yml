name: Deploy RAG to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: rag-digestats
  REGION: europe-west1
  REPO_NAME: rag-repo
  IMAGE_NAME: rag-app
  SERVICE_NAME: rag-digestats

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions: # Nécessaire pour supprimer le cache
      contents: read
      actions: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: pip install langgraph langchain langchain-core langchain-community pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v

      # --- ÉTAPE DE NETTOYAGE DU CACHE ---
      - name: Clear Docker cache
        run: gh cache delete --all || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |-
          sed -i "s|:latest|:${{ github.sha }}|g" service.yaml
          gcloud run services replace service.yaml --region=${{ env.REGION }}

